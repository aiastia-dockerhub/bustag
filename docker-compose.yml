version: '3.8'

services:
  javbus-api:
    image: ovnrain/javbus-api
    container_name: javbus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      # 如果需要认证，取消注释以下环境变量
      # - JAVBUS_API_TOKEN=your_token_here

  bustag:
    image: aiastia/bustag:vue
    container_name: bustag
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
      - JAVBUS_API_URL=http://javbus-api:3000
      # - JAVBUS_AUTH_TOKEN=your_token_here
    volumes:
      - ./data:/app/data
    depends_on:
      - javbus-api