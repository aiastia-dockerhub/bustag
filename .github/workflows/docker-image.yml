name: ci

on:
  push:
    branches:
      - 'master'
      - 'feature/movie-type-filter'
      - 'feature/vue-frontend'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'text'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: aiastia/bustag
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=test,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/feature/movie-type-filter' }}
            type=raw,value=vue,enable=${{ github.ref == 'refs/heads/feature/vue-frontend' }}
            type=semver,pattern={{version}}
      -
        name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
