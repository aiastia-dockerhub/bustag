name: ci

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'text'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aiastia/bustag
          tags: |
            type=raw,value=test,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha
      -
        name: Debug - Check secrets
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is set"
          else
            echo "ERROR: DOCKER_USERNAME is NOT set"
          fi
          if [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD is set (length: ${#DOCKER_PASSWORD_VAL})"
          else
            echo "ERROR: DOCKER_PASSWORD is NOT set"
          fi
        env:
          DOCKER_PASSWORD_VAL: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}