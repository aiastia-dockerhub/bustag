[database]
# 数据库类型：sqlite（默认）或 mysql
type = sqlite
# MySQL 配置（type=mysql 时生效，使用外部数据库）
# host = localhost
# port = 3306
# name = bustag
# user = root
# password = 

[download]
# javbus-api 服务地址（需要先部署 https://github.com/ovnrain/javbus-api ）
api_base_url = http://localhost:3000
# 认证 Token（如果 javbus-api 配置了 Token 认证，在此填写）
auth_token = 
# JavBus 网站地址（用于生成影片链接，默认 https://www.javbus.com）
javbus_url = https://www.javbus.com
# 图片基础 URL（用于补全 API 返回的相对图片路径，默认同 javbus_url）
img_base_url = https://www.javbus.com
# 每次下载的页数（每页约 30 个影片）
count = 10
# 磁力链接筛选：exist=只返回有磁力链接的影片, all=返回全部影片
magnet = exist
# 影片类型：normal=有码影片, uncensored=无码影片
movie_type = normal
# 调度模式：interval=间隔模式（每隔N秒），cron=定时模式（每天固定时间）
schedule_mode = cron
# 定时模式：每天执行的时间（小时，逗号分隔），仅在 schedule_mode=cron 时生效
# 例如：8,14,20 表示每天 8:00、14:00、20:00 执行
schedule_times = 8,14,20
# 间隔模式：自动下载间隔（秒），仅在 schedule_mode=interval 时生效
# 10800秒=3小时, 3600秒=1小时, 1800秒=30分钟
interval = 10800
# API 请求间隔（秒），避免请求过快
api_interval = 0.5
# 分批处理：每批番号数量
batch_size = 100
# 分批处理：批次间隔（秒）
batch_interval = 5
# 图片磁盘缓存（开启后已下载的图片不再重复请求）
img_cache_enabled = true
